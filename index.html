<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="alternate icon" type="image/png" href="./assets/favicon.png">
  <link rel="apple-touch-icon" href="./assets/favicon.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cocktail Recipe Finder</title>

  <!-- Tailwind (OK to keep CDN for now; warning is informational) -->
  <script src="https://cdn.tailwindcss.com" defer></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest" defer></script>

  <!-- Load recipes.json FIRST so window.allRecipes exists before app.js runs -->
  <script>
    async function loadRecipes() {
      try {
        const res = await fetch("./data/recipes.json", { cache: "no-store" });
        const data = await res.json();
        window.allRecipes = Array.isArray(data) ? data : [];
        console.log("Total recipes loaded (from JSON):", window.allRecipes.length);
      } catch (err) {
        console.error("Failed to load recipes.json", err);
        window.allRecipes = [];
      }
    }
    loadRecipes();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    #recipe-grid-container { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    #recipe-grid-container::-webkit-scrollbar { width: 8px; }
    #recipe-grid-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
    #recipe-grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
    #recipe-grid-container::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .accordion-button[aria-expanded="true"] .accordion-icon { transform: rotate(180deg); }
    .accordion-icon { transition: transform 0.3s ease-in-out; }
  </style>
</head>
<body class="antialiased text-slate-800">
  <div class="min-h-screen w-full flex flex-col max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
    <header class="mb-4 md:mb-6">
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900">Cocktail Finder</h1>
      <p class="text-base md:text-lg text-slate-600 mt-1">Find your perfect drink.</p>
    </header>

    <div class="flex flex-col md:flex-row flex-1 min-h-0">
      <!-- Filters (desktop) -->
      <aside id="desktop-filter-panel" class="hidden md:block w-full md:w-1/3 lg:w-1/4 xl:w-1/5 pr-6">
        <div class="sticky top-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-slate-900">Filters</h2>
            <button id="clear-filters-desktop" class="text-sm font-medium text-blue-600 hover:text-blue-800">Clear All</button>
          </div>

          <!-- Search (desktop) -->
          <div class="mb-4">
            <label for="search" class="text-sm font-semibold text-slate-900 mb-2 block">Search</label>
            <div class="relative">
              <input
                type="text"
                id="search"
                placeholder="Search name, ingredients, liquors… (comma to add more)"
                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="search" class="w-5 h-5"></i>
              </span>
            </div>
          </div>

          <!-- Accordions -->
          <div id="filter-accordions-desktop" class="space-y-2 border-t border-slate-200 pt-2">
            <!-- Flavor -->
            <div class="border-b border-slate-200 py-2">
              <button class="accordion-button w-full flex justify-between items-center text-left font-semibold text-slate-900" aria-expanded="false">
                <span>Flavor Profile</span>
                <i data-lucide="chevron-down" class="w-5 h-5 accordion-icon"></i>
              </button>
              <div class="accordion-content pt-3 space-y-2">
                <div id="filter-flavor" class="space-y-2">
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Sweet" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Sweet</span></label>
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Sour" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Sour</span></label>
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Strong" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Strong</span></label>
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Refreshing" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Refreshing</span></label>
                </div>
              </div>
            </div>

            <!-- Difficulty -->
            <div class="border-b border-slate-200 py-2">
              <button class="accordion-button w-full flex justify-between items-center text-left font-semibold text-slate-900" aria-expanded="false">
                <span>Difficulty</span>
                <i data-lucide="chevron-down" class="w-5 h-5 accordion-icon"></i>
              </button>
              <div class="accordion-content pt-3 space-y-2">
                <div id="filter-difficulty" class="space-y-2">
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Easy" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Easy</span></label>
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Medium" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Medium</span></label>
                  <label class="flex items-center space-x-2 text-slate-700"><input type="checkbox" value="Advanced" class="filter-checkbox rounded text-blue-600 focus:ring-blue-500"><span>Advanced</span></label>
                </div>
              </div>
            </div>

            <!-- Glassware (dynamic) -->
            <div class="border-b border-slate-200 py-2">
              <button class="accordion-button w-full flex justify-between items-center text-left font-semibold text-slate-900" aria-expanded="false">
                <span>Glassware</span>
                <i data-lucide="chevron-down" class="w-5 h-5 accordion-icon"></i>
              </button>
              <div class="accordion-content pt-3 space-y-2">
                <div id="filter-glassware-options" class="space-y-2"><!-- injected --></div>
              </div>
            </div>
          </div>

          <button id="show-recipes-desktop" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-md mt-6">
            Show Recipes
          </button>
        </div>
      </aside>

      <!-- Results -->
      <main class="flex-1 flex flex-col min-h-0 min-w-0 md:pl-6">
        <!-- Mobile: search + filter button -->
        <div class="md:hidden flex items-center gap-2 mb-3">
          <div class="relative flex-1">
            <input id="search-mobile" type="text" placeholder="Search drinks or ingredients"
                   class="w-full pl-10 pr-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <i data-lucide="search" class="w-5 h-5"></i>
            </span>
          </div>
          <button id="mobile-filter-button" class="shrink-0 px-3 py-2 rounded-lg bg-slate-800 text-white font-medium hover:bg-slate-900">
            Filters
          </button>
        </div>

        <div id="recipe-grid-container" class="flex-1 overflow-y-auto bg-slate-100 p-4 rounded-lg border border-slate-200">
          <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
          <div id="no-results" class="hidden text-center text-slate-500 p-10">
            <p class="text-lg font-medium">No recipes found.</p>
            <p>Try adjusting your filters or clearing them to see all recipes.</p>
          </div>
          <div id="initial-message" class="text-center text-slate-500 p-10">
            <p class="text-lg font-medium">Select your filters and click "Show Recipes" to begin.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Mobile filter modal shell (optional) -->
  <div id="filter-modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>
  <div id="filter-modal" class="fixed top-0 left-0 w-4/5 max-w-sm h-full bg-white z-50 shadow-xl overflow-y-auto hidden md:hidden"></div>

  <!-- Card template -->
  <template id="recipe-card-template">
    <div class="recipe-card bg-white rounded-lg shadow-md overflow-hidden transform hover:scale-[1.02] transition-transform duration-300 flex flex-col">
      <img class="w-full h-40 object-cover" src="" alt="Cocktail Image" />
      <div class="p-5 flex flex-col flex-1">
        <h3 class="text-xl font-bold text-slate-900 mb-2"></h3>
        <div class="flex flex-wrap gap-2 mb-4"></div>
        <div class="mb-4">
          <h4 class="font-semibold text-slate-800 mb-1">Ingredients:</h4>
          <ul class="list-disc list-inside text-slate-600 text-sm space-y-1"></ul>
        </div>
        <div class="mt-auto">
          <h4 class="font-semibold text-slate-800 mb-1">Instructions:</h4>
          <ol class="list-decimal list-inside text-slate-600 text-sm space-y-1"></ol>
        </div>
      </div>
    </div>
  </template>

  <!-- Only this one app script -->
  <script src="./scripts/app.js" defer></script>
</body>
</html>
